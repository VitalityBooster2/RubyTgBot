name: Ruby CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 ffmpeg
        pip3 install yt-dlp
    
    - name: Install dependencies
      run: bundle install
    
    - name: Run tests
      env:
        CI: true
      run: |
        bundle exec ruby test/file_analyzer_test.rb
        bundle exec ruby test/link_shortener_test.rb
        bundle exec ruby test/message_router_test.rb
        bundle exec ruby test/chat_state_service_test.rb
        bundle exec ruby test/bot_flow_integration_test.rb
        bundle exec ruby test/python_sandbox_test.rb