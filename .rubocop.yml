AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  Exclude:
    - 'tmp/**/*'
    - 'vendor/**/*'
    - 'coverage/**/*'
    - 'test/**/*'          
    - 'spec/**/*'           
    - 'features/**/*' 
    - 'bot.rb'      

# Остальные настройки
Style/Documentation:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 12   

Metrics/PerceivedComplexity:
  Max: 12   

Metrics/MethodLength:
  Max: 45   
  Exclude:
    - 'lib/programmer_helper_bot/youtube_audio_downloader.rb' 

Metrics/AbcSize:
  Max: 30   
Metrics/BlockLength:
  Max: 45   